<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Frequency Wheel</title>

<link rel="stylesheet" href="wheel.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mediaelement@7/dist/mediaelementplayer.min.css">

 

</head>

<body>

<div class="wheel">

<div class="ring" id="ring"></div>

<button class="pad p1" onclick="playFreq('sounds/174hz.mp3',174)">174</button>
<button class="pad p2" onclick="playFreq('sounds/258hz.mp3',258)">258</button>
<button class="pad p3" onclick="playFreq('sounds/369hz.mp3',369)">369</button>
<button class="pad p4" onclick="playFreq('sounds/417hz.mp3',417)">417</button>
<button class="pad p5" onclick="playFreq('sounds/528hz.mp3',528)">528</button>
<button class="pad p6" onclick="playFreq('sounds/672hz.mp3',672)">672</button>

<button onclick="playClip('174hz.mp3')">174hz</button>
<button onclick="playClip('258hz.mp3')">258hz</button>
<button onclick="playClip('369hz.mp3')">369hz</button> 

<div class="center" id="centerPlayer">

<div id="freqLabel">PLAY</div>

</div>

</div>

<audio id="player"></audio>
<audio id="player" controls preload="none">
    <source src="sounds/174hz.mp3" type="audio/mp3">
</audio>

<script src="wheel.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mediaelement@7/dist/mediaelement-and-player.min.js"></script> 
<script>
document.addEventListener("DOMContentLoaded", () => {

    const player = new MediaElementPlayer("player", {
        features: ['playpause','progress','current','duration','volume']
    });

});
</script> 

</body>
</html>
