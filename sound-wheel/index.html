<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Audio Wheel</title>
<link rel="stylesheet" href="wheel.css">
</head>

<body>

<div id="wheelModal" class="modal">

<div class="modal-content">

<span id="closeWheel" class="close">✕</span>

<div class="wheel">  

<div class="wheel">

<button class="pad p1" onclick="play('a1')">1</button>
<button class="pad p2" onclick="play('a2')">2</button>
<button class="pad p3" onclick="play('a3')">3</button>
<button class="pad p4" onclick="play('a4')">4</button>
<button class="pad p5" onclick="play('a5')">5</button>
<button class="pad p6" onclick="play('a6')">6</button>

<div class="center">PLAY</div>

</div>

<audio id="a1" src="sounds/174hz.mp3"></audio>
<audio id="a2" src="sounds/258hz.mp3"></audio>
<audio id="a3" src="sounds/369hz.mp3"></audio>
<audio id="a4" src="sounds/412hz.mp3"></audio>
<audio id="a5" src="sounds/528hz.mp3"></audio>
<audio id="a6" src="sounds/672hz.mp3"></audio>
<audio id="a6" src="sounds/741hz.mp3"></audio>  
<audio id="a6" src="sounds/852hz.mp3"></audio>
<audio id="a6" src="sounds/963hz.mp3"></audio> 

<script src="wheel.js"></script>

</body>
</html>
