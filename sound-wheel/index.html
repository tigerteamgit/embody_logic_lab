<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Audio Wheel</title>
<link rel="stylesheet" href="wheel.css">
</head>

<body>

<div class="wheel">

<button class="pad p1" onclick="play('a1')">1</button>
<button class="pad p2" onclick="play('a2')">2</button>
<button class="pad p3" onclick="play('a3')">3</button>
<button class="pad p4" onclick="play('a4')">4</button>
<button class="pad p5" onclick="play('a5')">5</button>
<button class="pad p6" onclick="play('a6')">6</button>

<div class="center">PLAY</div>

</div>

<audio id="a1" src="sounds/clip1.mp3"></audio>
<audio id="a2" src="sounds/clip2.mp3"></audio>
<audio id="a3" src="sounds/clip3.mp3"></audio>
<audio id="a4" src="sounds/clip4.mp3"></audio>
<audio id="a5" src="sounds/clip5.mp3"></audio>
<audio id="a6" src="sounds/clip6.mp3"></audio>

<script src="wheel.js"></script>

</body>
</html>
